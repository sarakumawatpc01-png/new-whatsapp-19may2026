version: '3.8'

services:
  # ── Infrastructure ─────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: whatsapp_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # ── Applications ───────────────────────────────

  web:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm --filter @apps/web dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  admin:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm --filter @apps/admin dev"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  api:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm --filter @apps/api dev"
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  worker:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm --filter @apps/worker dev"
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ── Reverse Proxy ──────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  node_modules_cache:

networks:
  app-network:
    driver: bridge