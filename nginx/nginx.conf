events {
  worker_connections 1024;
}

http {
  upstream web_app {
    server web:3000;
  }

  upstream admin_app {
    server admin:3001;
  }

  upstream api_backend {
    server api:3002;
  }

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml;
    gzip_min_length 1000;

    # API routes
    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass http://api_backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support
    location /socket.io/ {
      proxy_pass http://api_backend/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 86400;
    }

    # Health check (no rate limit)
    location /health {
      proxy_pass http://api_backend/health;
    }

    # Auth routes (stricter rate limit)
    location /api/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://api_backend/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin panel
    location /admin/ {
      proxy_pass http://admin_app/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Public API (v1)
    location /v1/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://api_backend/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Meta webhook verification (no rate limit)
    location /webhooks/meta {
      proxy_pass http://api_backend/webhooks/meta;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Web app (catch-all)
    location / {
      proxy_pass http://web_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
